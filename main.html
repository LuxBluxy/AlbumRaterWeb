<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Album Rater</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--surface3:#252535;
    --border:#2a2a3d;--accent:#e8ff47;--accent2:#ff6b6b;--accent3:#1db954;
    --text:#f0f0f5;--text2:#888899;--text3:#555566;--radius:12px;
    --shadow:0 4px 24px rgba(0,0,0,0.5);
  }
  [data-theme="light"] {
    --bg:#f5f5f0;--surface:#fff;--surface2:#efefea;--surface3:#e5e5e0;
    --border:#d5d5cc;--text:#0a0a0f;--text2:#555566;--text3:#999;
    --shadow:0 4px 24px rgba(0,0,0,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
  #app{display:flex;flex-direction:column;min-height:100vh}
  header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);
    padding:0 1rem;display:flex;align-items:center;gap:.6rem;height:56px}
  .logo{font-family:'Bebas Neue',cursive;font-size:1.7rem;letter-spacing:2px;color:var(--accent);flex-shrink:0;line-height:1}
  .logo span{color:var(--text)}
  nav{display:flex;gap:2px;margin-left:auto}
  nav button{background:none;border:none;cursor:pointer;color:var(--text2);font-family:'DM Sans',sans-serif;
    font-size:.8rem;font-weight:500;padding:6px 10px;border-radius:8px;transition:all .2s;
    display:flex;align-items:center;gap:5px}
  nav button:hover{background:var(--surface2);color:var(--text)}
  nav button.active{background:var(--surface2);color:var(--accent)}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:6px;border-radius:8px;
    transition:all .2s;font-size:1.1rem;display:flex;align-items:center}
  .icon-btn:hover{background:var(--surface2);color:var(--text)}
  main{flex:1;max-width:900px;margin:0 auto;padding:1.2rem 1rem 5rem;width:100%}
  .view{display:none}.view.active{display:block}

  /* SEARCH */
  .search-bar{display:flex;gap:8px;margin-bottom:1rem}
  .search-bar input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
    padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
  .search-bar input:focus{border-color:var(--accent)}
  .btn{background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:10px 16px;
    font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s;white-space:nowrap}
  .btn:hover{opacity:.85}
  .btn.secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}
  .btn.danger{background:var(--accent2);color:#fff}
  .btn.small{padding:6px 12px;font-size:.8rem}
  .source-tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
  .source-tab{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);border-radius:20px;
    padding:5px 14px;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .source-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}
  .source-tab.sp.active{background:var(--accent3);color:#fff;border-color:var(--accent3)}
  .results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
  .album-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;transition:all .2s}
  .album-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
  .album-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--surface2)}
  .ph{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
  .album-card-info{padding:8px 10px}
  .album-card-info h3{font-size:.82rem;font-weight:600;line-height:1.3;margin-bottom:2px}
  .album-card-info p{font-size:.72rem;color:var(--text2)}
  .album-card-info small{font-size:.68rem;color:var(--text3)}

  /* SPOTIFY PANEL */
  .sp-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
    padding:1rem;margin-bottom:1rem}
  .sp-panel h3{font-size:.9rem;font-weight:600;margin-bottom:.5rem}
  .sp-panel p{font-size:.8rem;color:var(--text2);line-height:1.5;margin-bottom:.6rem}
  .sp-panel a{color:var(--accent3)}
  .creds-row{display:flex;gap:6px;flex-wrap:wrap}
  .creds-row input{flex:1;min-width:130px;background:var(--surface2);border:1.5px solid var(--border);
    border-radius:8px;padding:7px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s}
  .creds-row input:focus{border-color:var(--accent3)}
  .sp-status{margin-top:.5rem;font-size:.78rem}

  /* MANUAL */
  .form-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.2rem;margin-bottom:1rem}
  .form-card h2{font-size:1rem;font-weight:600;margin-bottom:1rem}
  .field{margin-bottom:.75rem}
  .field label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:3px;font-weight:500}
  .field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;
    padding:7px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s}
  .field input:focus{border-color:var(--accent)}
  .track-input-row{display:flex;gap:6px;margin-bottom:5px;align-items:center}
  .track-input-row input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;
    padding:6px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none}
  .track-num{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text3);min-width:18px;text-align:right}

  /* RATING */
  .rating-header{display:flex;gap:1rem;margin-bottom:1.2rem;align-items:flex-start}
  .rating-cover{width:90px;height:90px;border-radius:8px;overflow:hidden;flex-shrink:0;
    background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:2.2rem}
  .rating-cover img{width:100%;height:100%;object-fit:cover}
  .rating-meta{flex:1;min-width:0}
  .rating-meta h1{font-family:'Bebas Neue',cursive;font-size:1.7rem;letter-spacing:1px;line-height:1.1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rating-meta p{color:var(--text2);font-size:.87rem;margin-top:2px}
  .rating-meta small{color:var(--text3);font-size:.76rem}
  .action-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .tracks-list{display:flex;flex-direction:column;gap:5px}
  .track-row{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;
    padding:8px 10px;display:flex;align-items:center;gap:8px;transition:border-color .15s}
  .track-num-badge{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--text3);min-width:18px;text-align:right;flex-shrink:0}
  .track-name{flex:1;font-size:.87rem;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track-dur{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text3);flex-shrink:0}
  .rating-btns{display:flex;gap:2px;flex-shrink:0}
  .rating-btn{border:1.5px solid var(--border);background:none;border-radius:6px;padding:3px 6px;
    cursor:pointer;font-size:.7rem;font-weight:600;color:var(--text2);font-family:'DM Mono',monospace;transition:all .15s}
  .rating-btn:hover{border-color:var(--accent);color:var(--accent)}
  .s0{background:#ff3a3a22;border-color:#ff3a3a;color:#ff3a3a}
  .s025{background:#ff6b3322;border-color:#ff6b33;color:#ff6b33}
  .s05{background:#ffcc0022;border-color:#ffcc00;color:#ffcc00}
  .s1{background:#6bff9922;border-color:#6bff99;color:#6bff99}
  .s15{background:#e8ff4722;border-color:var(--accent);color:var(--accent)}

  /* SCORE PANEL */
  .score-panel{position:sticky;bottom:0;left:0;right:0;background:var(--surface);border-top:1.5px solid var(--border);
    padding:8px 1rem;display:flex;align-items:center;gap:10px;z-index:50}
  .score-display{font-family:'Bebas Neue',cursive;font-size:2rem;line-height:1;color:var(--accent)}
  .score-label{font-size:.7rem;color:var(--text2)}
  .progress-bar{flex:1;height:5px;background:var(--surface3);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
  .rated-count{font-size:.76rem;color:var(--text2);font-family:'DM Mono',monospace}

  /* LISTS */
  .rated-album-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
    padding:10px;display:flex;gap:10px;cursor:pointer;transition:all .2s;margin-bottom:8px;align-items:center}
  .rated-album-card:hover{border-color:var(--accent)}
  .rated-cover{width:50px;height:50px;border-radius:6px;overflow:hidden;flex-shrink:0;
    background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.3rem}
  .rated-cover img{width:100%;height:100%;object-fit:cover}
  .rated-info{flex:1;min-width:0}
  .rated-info h3{font-size:.87rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rated-info p{font-size:.77rem;color:var(--text2)}
  .rated-score{font-family:'Bebas Neue',cursive;font-size:1.55rem;color:var(--accent);flex-shrink:0}
  .pending-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
    padding:10px;display:flex;gap:10px;margin-bottom:8px;align-items:center}
  .section-title{font-family:'Bebas Neue',cursive;font-size:1.1rem;letter-spacing:1px;color:var(--text2);margin-bottom:.8rem}
  .spinner{display:inline-block;width:17px;height:17px;border:2px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-row{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:.87rem;padding:.8rem 0}
  .empty{text-align:center;padding:2.5rem 1rem;color:var(--text2);font-size:.9rem}
  .empty .icon{font-size:2.6rem;margin-bottom:.6rem}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
    align-items:center;justify-content:center;padding:1rem}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;
    padding:1.4rem;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
  .modal h2{font-size:1.05rem;font-weight:600;margin-bottom:.8rem}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;flex-wrap:wrap}
  #toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--surface);border:1.5px solid var(--accent);color:var(--text);padding:9px 18px;
    border-radius:99px;font-size:.82rem;font-weight:500;z-index:999;opacity:0;transition:all .3s;
    pointer-events:none;white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:540px){
    nav button span.nav-label{display:none}
    .rating-btn{padding:2px 4px;font-size:.62rem}
    .results-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px}
    .logo{font-size:1.4rem}
    .rating-cover{width:80px;height:80px}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">🎵<span>RATE</span>IT</div>
    <nav>
      <button class="active" data-view="search" onclick="switchView('search')">🔍 <span class="nav-label">Search</span></button>
      <button data-view="rated" onclick="switchView('rated')">⭐ <span class="nav-label">Rated</span></button>
      <button data-view="pending" onclick="switchView('pending')">🕐 <span class="nav-label">Pending
        <span id="pending-badge" style="display:none;background:var(--accent);color:#000;border-radius:99px;padding:1px 5px;font-size:.65rem;font-weight:700;margin-left:2px"></span>
      </span></button>
    </nav>
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn" onclick="toggleLang()" id="lang-btn" style="font-size:.78rem;font-weight:700;padding:4px 7px">ES</button>
  </header>

  <main>
    <!-- SEARCH -->
    <div class="view active" id="view-search">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search albums…" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn" onclick="doSearch()">Search</button>
      </div>
      <div class="source-tabs">
        <button class="source-tab active" data-src="musicbrainz" onclick="selectSource('musicbrainz')">MusicBrainz</button>
        <button class="source-tab sp" data-src="spotify" onclick="selectSource('spotify')">🎵 Spotify</button>
        <button class="source-tab" data-src="manual" onclick="selectSource('manual')">+ Manual</button>
      </div>

      <div id="sp-panel" style="display:none" class="sp-panel">
        <h3>🎵 Spotify API</h3>
        <p id="sp-help">Get free credentials at <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com/dashboard</a> → Create App → copy <b>Client ID</b> and <b>Client Secret</b>. In the app settings set <b>Redirect URI</b> to <code>http://localhost</code>.</p>
        <div class="creds-row">
          <input type="text" id="sp-id" placeholder="Client ID" oninput="saveSpCreds()">
          <input type="password" id="sp-sec" placeholder="Client Secret" oninput="saveSpCreds()">
        </div>
        <div class="sp-status" id="sp-status"></div>
      </div>

      <div id="search-results"></div>

      <!-- Manual form -->
      <div id="manual-form" style="display:none">
        <div class="form-card">
          <h2>Create Album</h2>
          <div class="field"><label>Title</label><input type="text" id="m-title" placeholder="Album name"></div>
          <div class="field"><label>Artist</label><input type="text" id="m-artist" placeholder="Artist"></div>
          <div class="field"><label>Year</label><input type="number" id="m-year" placeholder="2024" min="1900" max="2100"></div>
          <div class="field"><label>Genre</label><input type="text" id="m-genre" placeholder="Rock, Jazz…"></div>
          <div class="field"><label>Cover URL</label><input type="url" id="m-cover" placeholder="https://…"></div>
          <div class="section-title" style="margin-top:.6rem">TRACKLIST</div>
          <div id="manual-tracks"></div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
            <button class="btn secondary small" onclick="addManualTrack()">+ Add Track</button>
            <button class="btn small" onclick="createManualAlbum()">Create & Rate</button>
            <button class="btn secondary small" onclick="createManualAlbumPending()">Add to Pending</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RATING -->
    <div class="view" id="view-rating">
      <div class="rating-header">
        <div class="rating-cover" id="rating-cover">🎵</div>
        <div class="rating-meta">
          <h1 id="rating-title">Album</h1>
          <p id="rating-artist"></p>
          <small id="rating-year"></small>
          <div class="action-row">
            <button class="btn secondary small" onclick="addCurrentToPending()">Add to Pending</button>
            <button class="btn small" onclick="saveRating()">Save</button>
            <button class="btn secondary small" onclick="switchView('search')">← Back</button>
          </div>
        </div>
      </div>
      <div id="tracks-list" class="tracks-list"></div>
    </div>

    <!-- RATED -->
    <div class="view" id="view-rated">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <div class="section-title" style="margin:0">RATED ALBUMS</div>
        <select id="sort-select" onchange="renderRated()"
          style="background:var(--surface2);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:4px 8px;font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none">
          <option value="score-desc">Score ↓</option>
          <option value="date-desc">Newest</option>
          <option value="title-asc">Title A-Z</option>
        </select>
      </div>
      <div id="rated-list"></div>
    </div>

    <!-- PENDING -->
    <div class="view" id="view-pending">
      <div class="section-title">PENDING LISTENS</div>
      <div id="pending-list"></div>
    </div>
  </main>

  <div class="score-panel" id="score-panel" style="display:none">
    <div>
      <div class="score-display" id="score-val">—</div>
      <div class="score-label">SCORE</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="rated-count" id="rated-count">0/0</div>
    <button class="btn small" onclick="saveRating()">Save</button>
  </div>

  <div id="toast"></div>

  <div class="modal-overlay" id="detail-modal">
    <div class="modal">
      <h2 id="detail-title"></h2>
      <p id="detail-artist" style="color:var(--text2);font-size:.87rem;margin-bottom:.9rem"></p>
      <div id="detail-tracks"></div>
      <div class="modal-actions">
        <button class="btn secondary small" onclick="closeModal()">Close</button>
        <button class="btn small" onclick="reRate()">Re-rate</button>
        <button class="btn danger small" onclick="deleteRated()">Delete</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
let currentAlbum=null, currentRatings={}, currentSource='musicbrainz';
let currentLang='en', currentTheme='dark', openDetailId=null;
let spToken=null, spTokenExp=0;

const RV=[
  {val:0,   lbl:'0', cls:'s0',   em:'💀'},
  {val:.25, lbl:'¼', cls:'s025', em:'👎'},
  {val:.5,  lbl:'½', cls:'s05',  em:'😐'},
  {val:1,   lbl:'1', cls:'s1',   em:'👍'},
  {val:1.5, lbl:'★', cls:'s15',  em:'❤️'},
];

// ── STORAGE ───────────────────────────────────────────────
const LS={
  get(k,fb){try{const v=localStorage.getItem('ri_'+k);return v?JSON.parse(v):fb}catch{return fb}},
  set(k,v){try{localStorage.setItem('ri_'+k,JSON.stringify(v))}catch{}}
};
let ratedAlbums  = LS.get('rated',[]);
let pendingAlbums= LS.get('pending',[]);

// ── INIT ──────────────────────────────────────────────────
window.onload=()=>{
  currentTheme=LS.get('theme','dark');
  currentLang =LS.get('lang','en');
  applyTheme(); applyLang(); updateBadge(); initManualTracks();
  const id=LS.get('sp_id',''), sec=LS.get('sp_sec','');
  if(id) document.getElementById('sp-id').value=id;
  if(sec) document.getElementById('sp-sec').value=sec;
  updateSpStatus();
};

// ── THEME / LANG ──────────────────────────────────────────
function toggleTheme(){currentTheme=currentTheme==='dark'?'light':'dark';LS.set('theme',currentTheme);applyTheme()}
function applyTheme(){
  document.documentElement.setAttribute('data-theme',currentTheme);
  document.querySelector('[onclick="toggleTheme()"]').textContent=currentTheme==='dark'?'🌙':'☀️';
}
function toggleLang(){currentLang=currentLang==='en'?'es':'en';LS.set('lang',currentLang);applyLang()}
function applyLang(){
  document.getElementById('lang-btn').textContent=currentLang==='en'?'ES':'EN';
  document.getElementById('search-input').placeholder=currentLang==='en'?'Search albums…':'Buscar álbumes…';
  document.querySelector('[data-src="manual"]').textContent=currentLang==='en'?'+ Manual':'+ Manual';
  document.querySelector('[onclick="doSearch()"]').textContent=currentLang==='en'?'Search':'Buscar';
  const spHelpEl=document.getElementById('sp-help');
  if(spHelpEl) spHelpEl.innerHTML=currentLang==='en'
    ?'Get free credentials at <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com/dashboard</a> → Create App → copy <b>Client ID</b> and <b>Client Secret</b>. Set <b>Redirect URI</b> to <code>http://localhost</code>.'
    :'Consigue credenciales gratis en <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com/dashboard</a> → Crear App → copia <b>Client ID</b> y <b>Client Secret</b>. Pon <b>Redirect URI</b> como <code>http://localhost</code>.';
  updateSpStatus();
  renderRated(); renderPending();
}

// ── VIEWS ─────────────────────────────────────────────────
function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name)?.classList.add('active');
  document.querySelector(`[data-view="${name}"]`)?.classList.add('active');
  document.getElementById('score-panel').style.display=name==='rating'?'flex':'none';
  if(name==='rated') renderRated();
  if(name==='pending') renderPending();
}

// ── SOURCES ───────────────────────────────────────────────
function selectSource(src){
  currentSource=src;
  document.querySelectorAll('.source-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-src="${src}"]`)?.classList.add('active');
  document.getElementById('manual-form').style.display=src==='manual'?'block':'none';
  document.getElementById('sp-panel').style.display=src==='spotify'?'block':'none';
  document.getElementById('search-results').innerHTML='';
}

// ── SEARCH ROUTER ─────────────────────────────────────────
async function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q||currentSource==='manual') return;
  const el=document.getElementById('search-results');
  el.innerHTML=`<div class="loading-row"><div class="spinner"></div> ${currentLang==='en'?'Searching…':'Buscando…'}</div>`;
  try{
    const res= currentSource==='spotify' ? await searchSpotify(q) : await searchMB(q);
    renderResults(res, el);
  }catch(e){
    el.innerHTML=`<div class="empty"><div class="icon">⚠️</div>${e.message||'No results'}</div>`;
  }
}

// ── MUSICBRAINZ ───────────────────────────────────────────
// MusicBrainz DOES support CORS for /ws/2/ but needs correct headers & query.
// We try multiple query strategies and fall back gracefully.
async function searchMB(q){
  const UA={'User-Agent':'AlbumRater/2.0 (contact@rateit.app)'};
  const base='https://musicbrainz.org/ws/2/release-group';
  const encoded=encodeURIComponent(q);

  // Strategy A: simple freetext search — most reliable
  const strategies=[
    `${base}?query=${encoded}&fmt=json&limit=25`,
    `${base}?query=release:%22${encoded}%22&fmt=json&limit=25`,
    `${base}?query=releasegroup:%22${encoded}%22+AND+primarytype:Album&fmt=json&limit=25`,
    `${base}?query=artist:%22${encoded}%22+AND+primarytype:Album&fmt=json&limit=25`,
  ];

  let rgs=[];
  for(const url of strategies){
    try{
      const r=await fetch(url,{headers:UA});
      if(!r.ok) continue;
      const d=await r.json();
      rgs=d['release-groups']||[];
      if(rgs.length) break;
    }catch(err){
      // CORS or network — continue to next
      console.warn('MB strategy failed:',url,err);
    }
  }

  if(!rgs.length) throw new Error(currentLang==='en'?'No results found':'Sin resultados');

  // Filter only Album types when possible
  const albums=rgs.filter(r=>!r['primary-type']||r['primary-type']==='Album');
  return (albums.length?albums:rgs).slice(0,20).map(rg=>({
    id:rg.id, mbid:rg.id,
    title:rg.title,
    artist:rg['artist-credit']?.[0]?.name||'?',
    year:rg['first-release-date']?.slice(0,4)||'',
    cover:'', source:'musicbrainz',
  }));
}

async function fetchMBTracks(mbid){
  const UA={'User-Agent':'AlbumRater/2.0 (contact@rateit.app)'};
  try{
    const rgR=await fetch(`https://musicbrainz.org/ws/2/release-group/${mbid}?inc=releases&fmt=json`,{headers:UA});
    if(!rgR.ok) return [];
    const rgD=await rgR.json();
    const rid=(rgD.releases||[])[0]?.id;
    if(!rid) return [];
    const relR=await fetch(`https://musicbrainz.org/ws/2/release/${rid}?inc=recordings&fmt=json`,{headers:UA});
    if(!relR.ok) return [];
    const relD=await relR.json();
    const tracks=[];
    (relD.media||[]).forEach(m=>(m.tracks||[]).forEach(tr=>tracks.push({
      title:tr.title, duration:tr.length?fmtMs(tr.length):'', position:tr.position
    })));
    return tracks;
  }catch{return []}
}

// ── SPOTIFY ───────────────────────────────────────────────
function saveSpCreds(){
  LS.set('sp_id',document.getElementById('sp-id').value.trim());
  LS.set('sp_sec',document.getElementById('sp-sec').value.trim());
  spToken=null; spTokenExp=0; updateSpStatus();
}
function updateSpStatus(){
  const el=document.getElementById('sp-status'); if(!el) return;
  const ok=LS.get('sp_id','')&&LS.get('sp_sec','');
  el.innerHTML=ok
    ?`<span style="color:var(--accent3);font-weight:500">✓ ${currentLang==='en'?'Credentials saved':'Credenciales guardadas'}</span>`
    :`<span style="color:var(--text3)">${currentLang==='en'?'Enter credentials above to enable Spotify search':'Introduce las credenciales para activar la búsqueda en Spotify'}</span>`;
}

async function getSpToken(){
  if(spToken&&Date.now()<spTokenExp) return spToken;
  const id=LS.get('sp_id',''), sec=LS.get('sp_sec','');
  if(!id||!sec) throw new Error(currentLang==='en'?'Enter Spotify credentials in the panel above':'Introduce las credenciales de Spotify arriba');
  const r=await fetch('https://accounts.spotify.com/api/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded','Authorization':'Basic '+btoa(id+':'+sec)},
    body:'grant_type=client_credentials'
  });
  if(!r.ok){
    const err=await r.json().catch(()=>({}));
    throw new Error(err.error_description||`Spotify auth error (${r.status}) – check credentials`);
  }
  const d=await r.json();
  spToken=d.access_token; spTokenExp=Date.now()+(d.expires_in-30)*1000;
  return spToken;
}

async function searchSpotify(q){
  const tok=await getSpToken();
  const r=await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=album&limit=20`,
    {headers:{Authorization:'Bearer '+tok}});
  if(!r.ok) throw new Error(`Spotify error (${r.status})`);
  const d=await r.json();
  const items=d.albums?.items||[];
  if(!items.length) throw new Error(currentLang==='en'?'No results found':'Sin resultados');
  return items.map(a=>({
    id:'sp-'+a.id, spId:a.id,
    title:a.name,
    artist:a.artists.map(x=>x.name).join(', '),
    year:a.release_date?.slice(0,4)||'',
    cover:a.images[0]?.url||'',
    totalTracks:a.total_tracks,
    source:'spotify',
  }));
}

async function fetchSpTracks(spId){
  try{
    const tok=await getSpToken();
    const r=await fetch(`https://api.spotify.com/v1/albums/${spId}/tracks?limit=50`,
      {headers:{Authorization:'Bearer '+tok}});
    if(!r.ok) return [];
    const d=await r.json();
    return (d.items||[]).map((tr,i)=>({title:tr.name,duration:fmtMs(tr.duration_ms),position:tr.track_number||i+1}));
  }catch{return []}
}

// ── ALBUM SELECTION ───────────────────────────────────────
async function selectAlbum(raw){
  const album=typeof raw==='string'?JSON.parse(raw):raw;
  const el=document.getElementById('search-results');
  el.innerHTML=`<div class="loading-row"><div class="spinner"></div> ${currentLang==='en'?'Loading tracks…':'Cargando pistas…'}</div>`;

    if(album.source==='spotify'&&album.spId) tracks=await fetchSpTracks(album.spId);
    else if(album.mbid)                      tracks=await fetchMBTracks(album.mbid);
  }catch(e){console.warn(e)}

}

// ── RATING ────────────────────────────────────────────────
function loadAlbumForRating(album){
  currentAlbum=album; currentRatings={};
  const ex=ratedAlbums.find(r=>r.album.id===album.id);
  if(ex) currentRatings={...ex.ratings};
  document.getElementById('rating-title').textContent=album.title;
  document.getElementById('rating-artist').textContent=album.artist;
  document.getElementById('rating-year').textContent=album.year||'';
  const cov=document.getElementById('rating-cover');
  cov.innerHTML=album.cover?`<img src="${esc(album.cover)}" onerror="this.parentElement.innerHTML='🎵'">`:'🎵';
  renderTracks(); switchView('rating'); updateScore();
}

function renderTracks(){
  const list=document.getElementById('tracks-list');
  if(!currentAlbum.tracks?.length){
    list.innerHTML=`<div class="empty"><div class="icon">📋</div>${currentLang==='en'?'No tracks – rate the album anyway or add tracks manually':'Sin pistas – valora el álbum o añade pistas manualmente'}</div>`;
    return;
  }
  list.innerHTML=currentAlbum.tracks.map((tr,i)=>{
    const cur=currentRatings[i];
    return `<div class="track-row" id="trow-${i}">
      <span class="track-num-badge">${tr.position||i+1}</span>
      <span class="track-name">${esc(tr.title)}</span>
      ${tr.duration?`<span class="track-dur">${tr.duration}</span>`:''}
      <div class="rating-btns">
        ${RV.map(rv=>`<button class="rating-btn${cur===rv.val?' '+rv.cls:''}" title="${rv.em}" onclick="setRating(${i},${rv.val})">${rv.lbl}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function setRating(idx,val){
  currentRatings[idx]=val;
  const row=document.getElementById('trow-'+idx);
  if(row){
    row.querySelectorAll('.rating-btn').forEach((btn,bi)=>{
      RV.forEach(rv=>btn.classList.remove(rv.cls));
      if(RV[bi].val===val) btn.classList.add(RV[bi].cls);
    });
  }
  updateScore();
}

function calcScore(){
  if(!currentAlbum?.tracks?.length) return null;
  const n=currentAlbum.tracks.length;
  const vals=Object.values(currentRatings);
  if(!vals.length) return null;
  const obtained=vals.reduce((a,b)=>a+b,0);
  let score=0.5+4.5*(obtained/(n*1.5));
  score+=(vals.filter(v=>v===1.5).length/n)*0.2;
  score-=(vals.filter(v=>v===0.5).length/n)*0.15;
  return Math.round(Math.min(5,Math.max(0.5,score))*2)/2;
}

function updateScore(){
  const n=currentAlbum?.tracks?.length||0;
  const rated=Object.keys(currentRatings).length;
  const sc=calcScore();
  document.getElementById('score-val').textContent=sc!==null?sc.toFixed(1):'—';
  document.getElementById('rated-count').textContent=`${rated}/${n}`;
  document.getElementById('progress-fill').style.width=n?`${rated/n*100}%`:'0%';
}

function saveRating(){
  if(!currentAlbum) return;
  const entry={id:currentAlbum.id,album:currentAlbum,ratings:{...currentRatings},score:calcScore(),date:Date.now()};
  const idx=ratedAlbums.findIndex(r=>r.album.id===currentAlbum.id);
  if(idx>=0) ratedAlbums[idx]=entry; else ratedAlbums.unshift(entry);
  LS.set('rated',ratedAlbums);
  pendingAlbums=pendingAlbums.filter(p=>p.id!==currentAlbum.id);
  LS.set('pending',pendingAlbums); updateBadge();
  showToast(currentLang==='en'?'Rating saved! ✓':'¡Guardado! ✓');
  setTimeout(()=>switchView('rated'),700);
}
function addCurrentToPending(){if(currentAlbum) addToPending(currentAlbum)}

// ── PENDING ───────────────────────────────────────────────
function addToPending(album){
  if(pendingAlbums.find(p=>p.id===album.id)){showToast(currentLang==='en'?'Already in pending':'Ya está en pendientes');return}
  pendingAlbums.unshift({...album,addedAt:Date.now()});
  LS.set('pending',pendingAlbums); updateBadge();
  showToast(currentLang==='en'?'Added to pending!':'¡Añadido a pendientes!');
}
function updateBadge(){
  const b=document.getElementById('pending-badge');
  if(pendingAlbums.length){b.textContent=pendingAlbums.length;b.style.display='inline'}else b.style.display='none';
}
function renderPending(){
  const el=document.getElementById('pending-list');
  if(!pendingAlbums.length){el.innerHTML=`<div class="empty"><div class="icon">🕐</div>${currentLang==='en'?'No pending albums':'Sin álbumes pendientes'}</div>`;return}

    <div class="pending-card">
      <div class="rated-cover">${a.cover?`<img src="${esc(a.cover)}" onerror="this.parentElement.innerHTML='🎵'">`:'🎵'}</div>
      <div class="rated-info" style="flex:1">
        <h3>${esc(a.title)}</h3>
        <p>${esc(a.artist)}${a.year?' · '+a.year:''}</p>

        <button class="btn secondary small" onclick="removePending('${a.id}')">✕</button>
      </div>
    </div>`).join('');
}
function rateFromPending(a){if(typeof a==='string')a=JSON.parse(a);loadAlbumForRating(a)}
function removePending(id){pendingAlbums=pendingAlbums.filter(p=>p.id!==id);LS.set('pending',pendingAlbums);updateBadge();renderPending()}

// ── RATED LIST ────────────────────────────────────────────
function renderRated(){
  const el=document.getElementById('rated-list');
  if(!ratedAlbums.length){el.innerHTML=`<div class="empty"><div class="icon">⭐</div>${currentLang==='en'?'No rated albums yet':'Aún no hay álbumes valorados'}</div>`;return}
  const sort=document.getElementById('sort-select')?.value||'score-desc';
  const sorted=[...ratedAlbums].sort((a,b)=>{
    if(sort==='score-desc') return(b.score||0)-(a.score||0);
    if(sort==='date-desc')  return b.date-a.date;
    return(a.album.title||'').localeCompare(b.album.title||'');
  });
  el.innerHTML=sorted.map(r=>`
    <div class="rated-album-card" onclick="openDetail('${r.id}')">
      <div class="rated-cover">${r.album.cover?`<img src="${esc(r.album.cover)}" onerror="this.parentElement.innerHTML='🎵'">`:'🎵'}</div>
      <div class="rated-info">
        <h3>${esc(r.album.title)}</h3>
        <p>${esc(r.album.artist)}${r.album.year?' · '+r.album.year:''}</p>
        <small>${r.album.tracks?.length?r.album.tracks.length+' tracks':''} · ${new Date(r.date).toLocaleDateString()}</small>
      </div>
      <div class="rated-score">${r.score!=null?r.score.toFixed(1):'—'}</div>
    </div>`).join('');
}

// ── DETAIL MODAL ──────────────────────────────────────────
function openDetail(id){
  const e=ratedAlbums.find(r=>r.id===id);if(!e)return;
  openDetailId=id;

  document.getElementById('detail-artist').textContent=`${e.album.artist}${e.album.year?' · '+e.album.year:''} · Score: ${e.score?.toFixed(1)||'—'} / 5`;

      <span style="font-size:.75rem;${rv===undefined?'color:var(--text3)':''}">${info?info.em+' '+info.lbl:currentLang==='en'?'unrated':'sin valorar'}</span>
    </div>`;
  }).join(''):'<p style="color:var(--text2);font-size:.87rem">No tracks</p>';
  document.getElementById('detail-modal').classList.add('open');
}
function closeModal(){document.getElementById('detail-modal').classList.remove('open');openDetailId=null}
function reRate(){const e=ratedAlbums.find(r=>r.id===openDetailId);closeModal();if(e)loadAlbumForRating(e.album)}
function deleteRated(){
  if(!openDetailId)return;
  ratedAlbums=ratedAlbums.filter(r=>r.id!==openDetailId);
  LS.set('rated',ratedAlbums);closeModal();renderRated();
  showToast(currentLang==='en'?'Album deleted':'Álbum eliminado');
}
document.getElementById('detail-modal').addEventListener('click',e=>{if(e.target.id==='detail-modal')closeModal()});

// ── UTILS ─────────────────────────────────────────────────
function fmtMs(ms){const s=Math.round(ms/1000);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
let toastT;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2400);
}

// Add this helper function at the top of your script or right above the MB functions
const delay = ms => new Promise(res => setTimeout(res, ms));

async function searchMB(q) {
  // Use Accept header instead of User-Agent to avoid CORS preflight failures
  const headers = { 'Accept': 'application/json' };
  const base = 'https://musicbrainz.org/ws/2/release-group';
  const encoded = encodeURIComponent(q);

  const strategies = [
    `${base}?query=${encoded}&fmt=json&limit=25`,
    `${base}?query=release:%22${encoded}%22&fmt=json&limit=25`,
    `${base}?query=releasegroup:%22${encoded}%22+AND+primarytype:Album&fmt=json&limit=25`,
    `${base}?query=artist:%22${encoded}%22+AND+primarytype:Album&fmt=json&limit=25`,
  ];

  let rgs = [];
  
  for (let i = 0; i < strategies.length; i++) {
    const url = strategies[i];
    try {
      const r = await fetch(url, { headers });
      
      // If we hit the rate limit anyway, back off for a bit longer
      if (r.status === 503 || r.status === 429) {
        console.warn('MB rate limit hit, backing off...');
        await delay(1500);
        continue;
      }
      
      if (!r.ok) continue;
      
      const d = await r.json();
      rgs = d['release-groups'] || [];
      if (rgs.length) break; // We found results, stop looping!
      
    } catch (err) {
      console.warn('MB strategy failed:', url, err);
    }
    
    // Crucial: Add a 1-second delay before firing the next strategy fallback
    if (i < strategies.length - 1 && !rgs.length) {
      await delay(1000); 
    }
  }

  if (!rgs.length) throw new Error(currentLang === 'en' ? 'No results found' : 'Sin resultados');

  const albums = rgs.filter(r => !r['primary-type'] || r['primary-type'] === 'Album');
  return (albums.length ? albums : rgs).slice(0, 20).map(rg => ({
    id: rg.id, mbid: rg.id,
    title: rg.title,
    artist: rg['artist-credit']?.[0]?.name || '?',
    year: rg['first-release-date']?.slice(0, 4) || '',
    cover: '', source: 'musicbrainz',
  }));
}

async function fetchMBTracks(mbid) {
  // Patch this one too, since it was also using the forbidden custom UA
  const headers = { 'Accept': 'application/json' };
  try {
    const rgR = await fetch(`https://musicbrainz.org/ws/2/release-group/${mbid}?inc=releases&fmt=json`, { headers });
    if (!rgR.ok) return [];
    
    const rgD = await rgR.json();
    const rid = (rgD.releases || [])[0]?.id;
    if (!rid) return [];
    
    // Add a 1-second delay between the release-group fetch and the release fetch
    await delay(1000);
    
    const relR = await fetch(`https://musicbrainz.org/ws/2/release/${rid}?inc=recordings&fmt=json`, { headers });
    if (!relR.ok) return [];
    const relD = await relR.json();
    
    const tracks = [];
    (relD.media || []).forEach(m => (m.tracks || []).forEach(tr => tracks.push({
      title: tr.title, duration: tr.length ? fmtMs(tr.length) : '', position: tr.position
    })));
    return tracks;
  } catch (e) {
    console.warn('Failed to fetch tracks:', e);
    return []; 
  }
}
